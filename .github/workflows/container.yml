name: container

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  GO_VERSION: "1.26.2"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/homelab-dashboard

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/homelab-dashboard

  meta:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.vars.outputs.version }}
      created: ${{ steps.vars.outputs.created }}
      release: ${{ steps.vars.outputs.release }}
    steps:
      - name: Derive version metadata
        id: vars
        shell: bash
        run: |
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
            release=true
          else
            version="main-${GITHUB_SHA::7}"
            release=false
          fi
          {
            echo "version=${version}"
            echo "created=${created}"
            echo "release=${release}"
          } >> "${GITHUB_OUTPUT}"

  build:
    if: github.event_name != 'pull_request'
    needs:
      - test
      - meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            artifact: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.title=homelab-dashboard
            org.opencontainers.image.description=Prometheus-backed homelab dashboard written in Go
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.meta.outputs.created }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            VERSION=${{ needs.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ needs.meta.outputs.created }}

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.artifact }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    if: github.event_name != 'pull_request'
    needs:
      - meta
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list
        working-directory: /tmp/digests
        shell: bash
        run: |
          mapfile -t sources < <(printf '${{ env.IMAGE_NAME }}@sha256:%s\n' *)
          docker buildx imagetools create \
            $(printf -- '-t %s ' ${{ steps.meta.outputs.tags }}) \
            "${sources[@]}"

      - name: Inspect published image
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            docker buildx imagetools inspect "${IMAGE_NAME}:${{ needs.meta.outputs.version }}"
          else
            docker buildx imagetools inspect "${IMAGE_NAME}:main"
          fi
