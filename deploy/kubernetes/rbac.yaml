apiVersion: v1
kind: ServiceAccount
metadata:
  name: homelab-dashboard
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-dashboard-read
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - pods
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - ocirepositories
    verbs: ["get", "list", "watch"]
  - apiGroups: ["volsync.backube"]
    resources:
      - replicationsources
    verbs: ["get", "list", "watch"]
  - apiGroups: ["external-secrets.io"]
    resources:
      - externalsecrets
      - secretstores
      - clustersecretstores
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homelab-dashboard-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homelab-dashboard-read
subjects:
  - kind: ServiceAccount
    name: homelab-dashboard
    namespace: ai
