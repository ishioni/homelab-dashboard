apiVersion: v1
kind: ServiceAccount
metadata:
  name: homelab-dashboard
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-dashboard-read
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - pods
      - events
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homelab-dashboard-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homelab-dashboard-read
subjects:
  - kind: ServiceAccount
    name: homelab-dashboard
    namespace: ai
